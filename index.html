      }
      .app-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(
            160deg,
            rgba(0, 0, 0, 0.35) 0%,
            rgba(0, 18, 41, 0.22) 45%,
            rgba(7, 32, 60, 0.15) 100%
          ),
          radial-gradient(
            ellipse at 50% 100%,
            rgba(0, 0, 0, 0.3),
            transparent 62%
          );
      }
      .app-bg .leaf {
        position: absolute;
        opacity: 0.22;
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
      }
      .frame {
        width: 100%;
        max-width: 1500px;
        height: calc(100vh - 56px);
        min-height: 640px;
        display: flex;
        background: var(--surface);
        border-radius: 24px;
        overflow: hidden;
        box-shadow:
          0 40px 90px -24px rgba(2, 10, 20, 0.6),
          0 1px 0 rgba(255, 255, 255, 0.06) inset;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      /* SIDEBAR */
      .sidebar {
        width: 270px;
        min-width: 270px;
        background: linear-gradient(
          180deg,
          var(--navy-900) 0%,
          var(--navy-800) 55%,
          var(--navy-700) 100%
        );
        display: flex;
        flex-direction: column;
        padding: 22px 16px;
        position: relative;
        z-index: 20;
        transition: margin-left 0.25s ease;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 6px 22px 6px;
      }
      .brand-mark {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #5fc4d6);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-family: "Anton", sans-serif;
        flex-shrink: 0;
        font-size: 18px;
      }
      .brand-text .t1 {
        font-family: "Anton", sans-serif;
        color: #fff;
        font-size: 17px;
        line-height: 1.05;
        letter-spacing: 0.02em;
      }
      .brand-text .t2 {
        color: var(--accent-light);
        font-size: 9.5px;
        letter-spacing: 0.16em;
        font-weight: 700;
        margin-top: 2px;
      }

      .nav-group {
        display: flex;
        flex-direction: column;

      function radarSvg(skills) {
        const n = skills.length,
          cx = 140,
          cy = 140,
          r = 105;
        const pts = skills.map((s, i) => {
          const ang = (Math.PI * 2 * i) / n - Math.PI / 2;
          const selfR = r * (s.self / 5),
            mgrR = r * (s.mgr / 5);
          return {
            self: [cx + selfR * Math.cos(ang), cy + selfR * Math.sin(ang)],
            mgr: [cx + mgrR * Math.cos(ang), cy + mgrR * Math.sin(ang)],
            label: [
              cx + (r + 22) * Math.cos(ang),
              cy + (r + 22) * Math.sin(ang),
            ],
            name: s.skill,
          };
        });
        const ring = (frac) =>
          skills
            .map((s, i) => {
              const ang = (Math.PI * 2 * i) / n - Math.PI / 2;
              return `${cx + r * frac * Math.cos(ang)},${cy + r * frac * Math.sin(ang)}`;
            })
            .join(" ");
        const selfPoly = pts.map((p) => p.self.join(",")).join(" ");
        const mgrPoly = pts.map((p) => p.mgr.join(",")).join(" ");
        return `
  <svg viewBox="0 0 280 300" style="width:100%; max-width:320px; display:block; margin:0 auto;">
    ${[0.25, 0.5, 0.75, 1].map((f) => `<polygon points="${ring(f)}" fill="none" stroke="#e6ebf2" stroke-width="1"/>`).join("")}
    <polygon points="${mgrPoly}" fill="rgba(47,111,237,.18)" stroke="var(--accent)" stroke-width="2"/>
    <polygon points="${selfPoly}" fill="rgba(148,163,184,.15)" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3"/>
    ${pts.map((p) => `<text x="${p.label[0]}" y="${p.label[1]}" font-size="9.5" fill="#64748b" text-anchor="middle" font-family="Inter">${p.name}</text>`).join("")}
  </svg>
  <div style="display:flex; gap:16px; justify-content:center; font-size:11.5px; color:var(--muted);">
    <span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--accent);margin-right:5px;"></span>Manager</span>
    <span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#94a3b8;margin-right:5px;"></span>Self</span>
  </div>`;
      }

    <label style="display:flex; align-items:center; gap:8px; font-size:13px; margin-bottom:14px;"><input type="checkbox" checked> Automatically remind managers of overdue reviews</label>

      function renderProfile() {

        return `
