<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centinel HR — Performance &amp; Development</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&family=Moontime&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy-900: #000000;
        --navy-800: #001229;
        --navy-700: #07203c;
        --navy-600: #082a57;
        --navy-500: #213d5d;
        --accent: #2f94dc;
        --accent-2: #5fc4d6;
        --accent-light: #d2ecff;
        --accent-soft: #eaf6fe;
        --teal: #2f94dc;
        --sand: #d2ecff;
        --ink: #0a1622;
        --muted: #5b7086;
        --green: #16a34a;
        --green-soft: #dcfce7;
        --red: #dc2626;
        --red-soft: #fee2e2;
        --amber: #d97706;
        --amber-soft: #fef3c7;
        --surface: #ffffff;
        --border: #e3ecf5;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "DM Sans", "Be Vietnam Pro", sans-serif;
        color: var(--ink);
      }
      .font-display {
        font-family: "Anton", sans-serif;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .font-script {
        font-family: "Moontime", cursive;
      }
      .app-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        background: #07203c;
      }
      .app-bg .bg-photo {
        position: absolute;
        inset: -3%;
        width: 106%;
        height: 106%;
        background-image: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80");
        background-size: cover;
        background-position: center;
        filter: blur(2.5px) saturate(1.05);
        transform: scale(1.01);
      }
      .app-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(
            160deg,
            rgba(0, 0, 0, 0.35) 0%,
            rgba(0, 18, 41, 0.22) 45%,
            rgba(7, 32, 60, 0.15) 100%
          ),
          radial-gradient(
            ellipse at 50% 100%,
            rgba(0, 0, 0, 0.3),
            transparent 62%
          );
      }
      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
      }
      .frame {
        width: 100%;
        max-width: 1500px;
        height: calc(100vh - 56px);
        min-height: 640px;
        display: flex;
        background: var(--surface);
        border-radius: 24px;
        overflow: hidden;
        box-shadow:
          0 40px 90px -24px rgba(2, 10, 20, 0.6),
          0 1px 0 rgba(255, 255, 255, 0.06) inset;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .sidebar {
        width: 270px;
        min-width: 270px;
        background: linear-gradient(
          180deg,
          var(--navy-900) 0%,
          var(--navy-800) 55%,
          var(--navy-700) 100%
        );
        display: flex;
        flex-direction: column;
        padding: 22px 16px;
        position: relative;
        z-index: 20;
        transition: margin-left 0.25s ease;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 6px 22px 6px;
      }
      .brand-mark {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #5fc4d6);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-family: "Anton", sans-serif;
        flex-shrink: 0;
        font-size: 18px;
      }
      .brand-mark svg {
        width: 22px;
        height: 22px;
        display: block;
      }
      .brand-text .t1 {
        font-family: "Anton", sans-serif;
        color: #fff;
        font-size: 17px;
        line-height: 1.05;
        letter-spacing: 0.02em;
      }
      .brand-text .t2 {
        color: var(--accent-light);
        font-size: 9.5px;
        letter-spacing: 0.16em;
        font-weight: 700;
        margin-top: 2px;
      }
      .nav-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 6px;
        flex: 1;
        overflow-y: auto;
        padding: 2px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 12px;
        color: #cfe0ef;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.045);
        border: 1px solid rgba(255, 255, 255, 0.06);
        text-align: left;
        width: 100%;
        transition:
          background 0.15s ease,
          color 0.15s ease,
          transform 0.15s ease,
          border-color 0.15s ease;
      }
      .nav-item svg {
        width: 17px;
        height: 17px;
        flex-shrink: 0;
        opacity: 0.85;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.09);
        color: #fff;
        transform: translateX(2px);
      }
      .nav-item.active {
        background: linear-gradient(135deg, var(--accent), #2b7fc0);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 8px 18px -8px rgba(47, 148, 220, 0.7);
      }
      .nav-item.active svg {
        opacity: 1;
      }
      .nav-section-label {
        color: #5f81a3;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        padding: 14px 14px 4px;
      }
      .sidebar-bottom {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding-top: 16px;
        margin-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        position: relative;
      }
      .sidebar-bottom button {
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #cfe0ef;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        cursor: pointer;
        position: relative;
        z-index: 1;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }
      .sidebar-bottom button span {
        display: none;
      }
      .sidebar-bottom button:hover {
        background: var(--accent);
        color: #fff;
        border-color: transparent;
      }
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 28px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: #fff;
        box-shadow:
          0 1px 0 rgba(15, 35, 60, 0.03),
          0 4px 12px -8px rgba(15, 35, 60, 0.08);
        position: relative;
        z-index: 10;
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--ink);
        padding: 4px;
      }
      .page-title {
        font-family: "Be Vietnam Pro", sans-serif;
        font-size: 21px;
        font-weight: 800;
        letter-spacing: 0.01em;
        line-height: 1.1;
        text-transform: uppercase;
        color: #0a1622;
      }
      .page-sub {
        font-size: 10.5px;
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-top: 2px;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 18px;
        position: relative;
      }
      .bell {
        position: relative;
        cursor: pointer;
        color: var(--ink);
      }
      .bell .dot {
        position: absolute;
        top: -3px;
        right: -3px;
        width: 9px;
        height: 9px;
        background: var(--red);
        border-radius: 50%;
        border: 2px solid #fff;
      }
      .user-chip {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 12px;
      }
      .user-chip:hover {
        background: #f4f7fb;
      }
      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
        box-shadow:
          0 0 0 3px rgba(47, 111, 237, 0.14),
          0 4px 10px -4px rgba(15, 35, 60, 0.3);
        background-size: cover;
        background-position: center;
        overflow: hidden;
      }
      .user-meta .name {
        font-weight: 700;
        font-size: 13.5px;
        line-height: 1.1;
      }
      .user-meta .role {
        font-size: 11px;
        color: var(--muted);
      }
      .notif-menu {
        position: absolute;
        top: 40px;
        right: -10px;
        width: 320px;
        max-height: 420px;
        overflow-y: auto;
        background: #fff;
        border-radius: 14px;
        border: 1px solid var(--border);
        box-shadow: 0 20px 40px -10px rgba(2, 10, 20, 0.25);
        padding: 8px;
        display: none;
        z-index: 50;
      }
      .notif-menu.open {
        display: block;
      }
      .notif-menu-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px 10px;
      }
      .notif-menu-head .t {
        font-size: 13px;
        font-weight: 800;
      }
      .notif-menu-head .c {
        font-size: 11px;
        color: var(--muted);
        font-weight: 600;
      }
      .notif-item {
        display: flex;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        cursor: default;
        position: relative;
      }
      .notif-item:hover {
        background: var(--accent-soft);
      }
      .notif-icon {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        background: var(--accent-soft);
        color: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .notif-icon svg {
        width: 16px;
        height: 16px;
      }
      .notif-main {
        flex: 1;
        min-width: 0;
      }
      .notif-title {
        font-size: 12.5px;
        font-weight: 700;
        line-height: 1.35;
      }
      .notif-sub {
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 2px;
        line-height: 1.4;
      }
      .notif-time {
        font-size: 10.5px;
        color: #94a3b8;
        margin-top: 4px;
        font-weight: 600;
      }
      .notif-item.unread::before {
        content: "";
        position: absolute;
        top: 16px;
        left: -2px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
      }
      .notif-empty {
        padding: 30px 10px;
        text-align: center;
        color: var(--muted);
        font-size: 12.5px;
      }
      .role-menu {
        position: absolute;
        top: 52px;
        right: 0;
        width: 250px;
        background: #fff;
        border-radius: 14px;
        border: 1px solid var(--border);
        box-shadow: 0 20px 40px -10px rgba(2, 10, 20, 0.25);
        padding: 8px;
        display: none;
        z-index: 50;
      }
      .role-menu.open {
        display: block;
      }
      .role-menu .label {
        font-size: 10px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.1em;
        padding: 8px 10px 4px;
      }
      .role-opt {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
      }
      .role-opt:hover {
        background: var(--accent-soft);
      }
      .role-opt.active {
        background: var(--accent-soft);
        font-weight: 700;
      }
      .role-opt .r-name {
        font-size: 13px;
        font-weight: 600;
      }
      .role-opt .r-desc {
        font-size: 10.5px;
        color: var(--muted);
      }
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 26px 28px 40px;
        background: linear-gradient(180deg, #fafcfe 0%, #f6f9fc 100%);
      }
      .card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow:
          0 1px 2px rgba(15, 35, 60, 0.04),
          0 8px 20px -12px rgba(15, 35, 60, 0.1);
        transition:
          box-shadow 0.2s ease,
          transform 0.2s ease;
      }
      .card:hover {
        box-shadow:
          0 4px 10px rgba(15, 35, 60, 0.06),
          0 16px 30px -14px rgba(15, 35, 60, 0.16);
        transform: translateY(-1px);
      }
      .soft-card {
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow:
          0 1px 2px rgba(15, 35, 60, 0.04),
          0 8px 20px -12px rgba(15, 35, 60, 0.1);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.03em;
        border: 1px solid transparent;
      }
      .badge-green {
        background: var(--green-soft);
        color: #15803d;
        border-color: #bbf0d0;
      }
      .badge-amber {
        background: var(--amber-soft);
        color: #b45309;
        border-color: #fde3ad;
      }
      .badge-red {
        background: var(--red-soft);
        color: #b91c1c;
        border-color: #fbcaca;
      }
      .badge-blue {
        background: var(--accent-soft);
        color: #1d4ed8;
        border-color: #c9ddfa;
      }
      .badge-grey {
        background: #eef2f6;
        color: #475569;
        border-color: #e2e8f0;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        border: none;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          background 0.15s ease;
      }
      .btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 6px 16px -6px rgba(47, 111, 237, 0.55);
      }
      .btn-primary:hover {
        background: #2559c9;
        transform: translateY(-1px);
        box-shadow: 0 10px 20px -8px rgba(47, 111, 237, 0.65);
      }
      .btn-ghost {
        background: #f1f5f9;
        color: var(--ink);
      }
      .btn-ghost:hover {
        background: #e5eaf0;
      }
      .btn-outline {
        background: #fff;
        color: var(--accent);
        border: 1.5px solid var(--accent);
      }
      .btn-outline:hover {
        background: var(--accent-soft);
        transform: translateY(-1px);
      }
      .progress-track {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: #eef2f6;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        position: relative;
        transition: width 0.5s ease;
      }
      .tab-row {
        display: flex;
        gap: 6px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 18px;
      }
      .tab-btn {
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
        background: none;
        border: none;
        cursor: pointer;
        border-bottom: 2.5px solid transparent;
        margin-bottom: -1px;
      }
      .tab-btn.active {
        color: var(--accent);
        border-color: var(--accent);
      }
      .grid-cols-auto {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 16px;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(8, 18, 30, 0.55);
        backdrop-filter: blur(3px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 20px;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #fff;
        border-radius: 18px;
        width: 100%;
        max-width: 520px;
        max-height: 88vh;
        overflow-y: auto;
        padding: 24px;
        box-shadow: 0 30px 70px -20px rgba(2, 10, 20, 0.5);
        animation: modalIn 0.18s ease;
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .field-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 6px;
        display: block;
      }
      .field-input,
      .field-select,
      .field-textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 13.5px;
        font-family: inherit;
        margin-bottom: 14px;
      }
      .field-textarea {
        resize: vertical;
        min-height: 70px;
      }
      .field-input:focus,
      .field-select:focus,
      .field-textarea:focus {
        outline: 2px solid var(--accent);
        border-color: var(--accent);
      }
      .star-row {
        display: flex;
        gap: 4px;
      }
      .star {
        cursor: pointer;
        color: #e2e8f0;
        font-size: 22px;
      }
      .star.filled {
        color: #fbbf24;
      }
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        opacity: 0;
        background: var(--navy-900);
        color: #fff;
        padding: 12px 20px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 200;
        transition: all 0.25s ease;
        pointer-events: none;
        box-shadow: 0 15px 40px -10px rgba(0, 0, 0, 0.4);
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .avatar-ring {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: linear-gradient(135deg, #647587, #8ea3b8);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 12px;
        flex-shrink: 0;
        background-size: cover;
        background-position: center;
        overflow: hidden;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: #c7d2dc;
        border-radius: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      @media (max-width: 900px) {
        .shell {
          padding: 0;
        }
        .frame {
          border-radius: 0;
          height: 100vh;
        }
        .sidebar {
          position: fixed;
          top: 0;
          bottom: 0;
          left: 0;
          margin-left: -270px;
          box-shadow: 20px 0 60px rgba(0, 0, 0, 0.3);
        }
        .sidebar.open {
          margin-left: 0;
        }
        .hamburger {
          display: block;
        }
        .page-title {
          font-size: 17px;
        }
        .content {
          padding: 18px 16px 32px;
        }
        .user-meta {
          display: none;
        }
        .topbar {
          padding: 14px 16px;
        }
      }
      .sb-scrim {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 15;
      }
      .sb-scrim.open {
        display: block;
      }
      .dev-snapshot-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .dev-snapshot-avg {
        display: flex;
        align-items: baseline;
        gap: 4px;
      }
      .dev-snapshot-avg .num {
        font-size: 26px;
        font-weight: 800;
        font-family: "Be Vietnam Pro", sans-serif;
      }
      .dev-snapshot-avg .denom {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }
      .dev-skill-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 0;
        border-bottom: 1px solid var(--border);
      }
      .dev-skill-row:last-of-type {

      function buildCharts() {
        chartInstances.forEach((c) => c.destroy());
        chartInstances = [];
        const deptEl = document.getElementById("chartDept");
        if (!deptEl) return;
        const deptCtx = deptEl.getContext("2d");
        const depts = [...new Set(team.map((t) => t.dept))];
        const deptAvg = depts.map((d) => {
          const ids = team.filter((t) => t.dept === d).map((t) => t.id);
          const gs = goals.filter((g) => ids.includes(g.employeeId));
          return gs.length
            ? Math.round(gs.reduce((a, g) => a + g.progress, 0) / gs.length)
            : 0;
        });
        // wrap long department names onto two lines so labels sit flat (no diagonal text)
        const deptLabels = depts.map((d) =>
          d.length > 10 && d.includes(" ") ? d.split(" ") : d,
        );
        const overallAvg = Math.round(
          deptAvg.reduce((a, v) => a + v, 0) / deptAvg.length,
        );
        const deptBadgeEl = document.getElementById("deptAvgBadge");
        if (deptBadgeEl) deptBadgeEl.textContent = overallAvg + "% avg";
        // per-bar gradient, richer navy-to-teal, plus a distinct tone for the top performer
        const topIdx = deptAvg.indexOf(Math.max(...deptAvg));
        const barColors = deptAvg.map((v, i) => {
          const g = deptCtx.createLinearGradient(0, 0, 0, 224);
          if (i === topIdx) {
            g.addColorStop(0, "#1d6fb8");
            g.addColorStop(1, "#5fc4d6");
          } else {
            g.addColorStop(0, "#2f94dc");
            g.addColorStop(1, "#a9dcf0");
          }
          return g;
        });
        chartInstances.push(
          new Chart(deptEl, {
            type: "bar",
            data: {
              labels: deptLabels,
              datasets: [
                {
                  label: "Avg Goal Progress",
                  data: deptAvg,
                  backgroundColor: barColors,
                  borderRadius: { topLeft: 8, topRight: 8 },
                  borderSkipped: false,
                  maxBarThickness: 46,
                  categoryPercentage: 0.62,
                  barPercentage: 0.9,
                },
              ],
            },
            options: {
              maintainAspectRatio: false,
              layout: { padding: { top: 22 } },
              animation: { duration: 700, easing: "easeOutQuart" },
              plugins: {
                legend: { display: false },
                datalabels: {
                  display: true,
                  anchor: "end",
                  align: "top",
                  offset: 2,
                  color: "#0a1622",
                  font: { size: 12, weight: "800" },
                  formatter: (v) => v + "%",
                },
                tooltip: {
                  backgroundColor: "#07203c",
                  padding: 10,
                  cornerRadius: 8,
                  displayColors: false,
                  titleFont: { size: 12, weight: "700" },
                  bodyFont: { size: 12 },
                  callbacks: {
                    title: (items) =>
                      Array.isArray(items[0].label)
                        ? items[0].label.join(" ")
                        : items[0].label,
                    label: (ctx) => ` ${ctx.parsed.y}% average progress`,
                  },
                },
              },
              scales: {
                y: {
                  beginAtZero: true,
                  max: 100,
                  ticks: {
                    stepSize: 25,
                    callback: (v) => v + "%",
                    font: { size: 10.5 },
                    color: "#94a7ba",
                  },
                  grid: { color: "#eef2f6" },
                  border: { display: false },
                },
                x: {
                  grid: { display: false },
                  border: { display: false },
                  ticks: {
                    maxRotation: 0,
                    minRotation: 0,
                    autoSkip: false,
                    font: { size: 11, weight: "700" },
                    color: "#3c4d60",
                  },
                },
              },
            },
          }),
        );
        const done = enrollments.filter((e) => e.status === "Completed").length;
        const prog = enrollments.filter(
          (e) => e.status === "In Progress",
        ).length;
        const notStarted = enrollments.filter(
          (e) => e.status === "Not Started",
        ).length;
        const trainingColors = ["#16a34a", "#2f94dc", "#dbe4ec"];
        const trainingLabels = ["Completed", "In Progress", "Not Started"];
        const trainingData = [done, prog, notStarted];
        const totalEnroll = done + prog + notStarted;
        chartInstances.push(
          new Chart(document.getElementById("chartTraining"), {
            type: "doughnut",
            data: {
              labels: trainingLabels,
              datasets: [
                {
                  data: trainingData,
                  backgroundColor: trainingColors,
                  borderWidth: 3,
                  borderColor: "#fff",
                  hoverOffset: 4,
                },
              ],
            },
            options: {
              maintainAspectRatio: false,
              cutout: "72%",
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: "#07203c",
                  padding: 10,
                  cornerRadius: 8,
                },
              },
            },
            plugins: [
              {
                id: "centerText",
                afterDraw(chart) {
                  const { ctx, chartArea } = chart;
                  const cx = (chartArea.left + chartArea.right) / 2;
                  const cy = (chartArea.top + chartArea.bottom) / 2;
                  ctx.save();
                  ctx.textAlign = "center";
                  ctx.textBaseline = "middle";
                  ctx.font = "800 22px 'Be Vietnam Pro', sans-serif";
                  ctx.fillStyle = "#0a1622";
                  ctx.fillText(String(totalEnroll), cx, cy - 8);
                  ctx.font = "600 10px 'DM Sans', sans-serif";
                  ctx.fillStyle = "#5b7086";
                  ctx.fillText("ENROLLED", cx, cy + 12);
                  ctx.restore();
                },
              },
            ],
          }),
        );
        const legendEl = document.getElementById("trainingLegend");
        if (legendEl) {
          legendEl.innerHTML = trainingLabels
            .map(
              (l, i) =>
                `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><span style="width:9px;height:9px;border-radius:3px;background:${trainingColors[i]};flex-shrink:0;"></span><span style="font-size:12px;font-weight:600;flex:1;">${l}</span><span style="font-size:12.5px;font-weight:800;">${trainingData[i]}</span></div>`,
            )
            .join("");
        }
        const trendEl = document.getElementById("chartTrend");
        const trendCtx = trendEl.getContext("2d");
        const trendGradient = trendCtx.createLinearGradient(0, 0, 0, 190);
        trendGradient.addColorStop(0, "rgba(47,148,220,.28)");
        trendGradient.addColorStop(1, "rgba(47,148,220,0)");
        const pmTrend = periodMeta[reportPeriod];
        chartInstances.push(
          new Chart(trendEl, {
            type: "line",
            data: {
              labels: pmTrend.trendLabels,
              datasets: [
                {
                  label: "Avg Goal Progress",
                  data: pmTrend.trendData,
                  borderColor: "#2f94dc",
                  backgroundColor: trendGradient,
                  fill: true,
                  tension: 0.4,
                  borderWidth: 2.5,
                  pointRadius: 3.5,
                  pointBackgroundColor: "#fff",
                  pointBorderColor: "#2f94dc",
                  pointBorderWidth: 2,
                  pointHoverRadius: 5.5,
                },
              ],
            },
            options: {
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: "#07203c",
                  padding: 10,
                  cornerRadius: 8,
                  callbacks: {
                    label: (ctx) => ` ${ctx.parsed.y}% average progress`,
                  },
                },
              },
              scales: {
                y: {
                  beginAtZero: true,
                  max: 100,
                  ticks: { callback: (v) => v + "%", font: { size: 10.5 } },
                  grid: { color: "#eef2f6" },
                  border: { display: false },
                },
                x: {
                  grid: { display: false },
                  border: { display: false },
                  ticks: { font: { size: 10.5, weight: "600" } },
                },
              },
            },
          }),
        );
      }

      function generateReportHTML(period) {
        const isHr = currentRole === "hradmin";
        const pm = periodMeta[period];
        const scopeTeam = isHr ? team : team.filter((t) => t.id !== "EMP-1005");
        const scopeGoals = isHr
          ? goals
          : goals.filter((g) => teamIds().includes(g.employeeId));
        const avgGoal = scopeGoals.length
          ? Math.round(
              scopeGoals.reduce((a, g) => a + g.progress, 0) /
                scopeGoals.length,
            )
          : 0;
        const completedReviews = reviews.filter(
          (r) => r.status === "Completed",
        ).length;
        const atRisk = scopeGoals.filter((g) => g.status === "At Risk").length;
        const done = enrollments.filter((e) => e.status === "Completed").length;
        const depts = [...new Set(scopeTeam.map((t) => t.dept))];
        const deptRows = depts.map((d) => {
          const ids = scopeTeam.filter((t) => t.dept === d).map((t) => t.id);
          const gs = goals.filter((g) => ids.includes(g.employeeId));
          const avg = gs.length
            ? Math.round(gs.reduce((a, g) => a + g.progress, 0) / gs.length)
            : 0;
          return { d, avg };
        });
        const empRows = scopeTeam.map((emp) => {
          const eg = goals.filter((g) => g.employeeId === emp.id);
          const avg = eg.length
            ? Math.round(eg.reduce((a, g) => a + g.progress, 0) / eg.length)
            : 0;
          const rev = reviews.find((r) => r.employeeId === emp.id);
          return { emp, avg, rev };
        });
        const now = new Date();
        const generatedStr = now.toLocaleDateString("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric",
        });
        const preparedBy = currentUsers[currentRole].name;
        return `
<div style="font-family:'DM Sans','Be Vietnam Pro',sans-serif;color:#0a1622;max-width:900px;margin:0 auto;padding:36px 40px;">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #07203c;padding-bottom:16px;margin-bottom:22px;">
    <div>
      <div style="font-family:'Anton',sans-serif;font-size:22px;letter-spacing:0.03em;color:#07203c;">CENTINEL HR</div>
      <div style="font-size:11px;letter-spacing:0.12em;color:#2f94dc;font-weight:700;margin-top:2px;">PERFORMANCE &amp; DEVELOPMENT REPORT</div>
    </div>
    <div style="text-align:right;font-size:11.5px;color:#5b7086;line-height:1.6;">
      <div><strong style="color:#0a1622;">${pm.label} Report</strong></div>
      <div>Period: ${pm.rangeLabel}</div>
      <div>Generated: ${generatedStr}</div>
      <div>Prepared by: ${preparedBy}</div>
    </div>
  </div>

  <div style="font-size:15px;font-weight:800;margin-bottom:10px;">${isHr ? "Organization" : "Team"} Summary</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px;">
    <div style="border:1px solid #e3ecf5;border-radius:8px;padding:12px;">
      <div style="font-size:10px;color:#5b7086;font-weight:700;letter-spacing:0.04em;">${isHr ? "EMPLOYEES" : "TEAM SIZE"}</div>
      <div style="font-size:22px;font-weight:800;margin-top:4px;">${scopeTeam.length}</div>
    </div>
    <div style="border:1px solid #e3ecf5;border-radius:8px;padding:12px;">
      <div style="font-size:10px;color:#5b7086;font-weight:700;letter-spacing:0.04em;">AVG GOAL PROGRESS</div>
      <div style="font-size:22px;font-weight:800;margin-top:4px;">${avgGoal}%</div>
    </div>
    <div style="border:1px solid #e3ecf5;border-radius:8px;padding:12px;">
      <div style="font-size:10px;color:#5b7086;font-weight:700;letter-spacing:0.04em;">REVIEWS COMPLETED</div>
      <div style="font-size:22px;font-weight:800;margin-top:4px;">${completedReviews} / ${reviews.length}</div>
    </div>
    <div style="border:1px solid #e3ecf5;border-radius:8px;padding:12px;">
      <div style="font-size:10px;color:#5b7086;font-weight:700;letter-spacing:0.04em;">GOALS AT RISK</div>
      <div style="font-size:22px;font-weight:800;margin-top:4px;color:${atRisk > 0 ? "#d97706" : "#0a1622"};">${atRisk}</div>
    </div>
  </div>

  <div style="font-size:15px;font-weight:800;margin-bottom:10px;">Goal Progress by Department</div>
  <table style="width:100%;border-collapse:collapse;margin-bottom:26px;font-size:12.5px;">
    <thead>
      <tr style="background:#f8fafc;">
        <th style="text-align:left;padding:8px 10px;border:1px solid #e3ecf5;color:#5b7086;font-size:10.5px;">DEPARTMENT</th>
        <th style="text-align:left;padding:8px 10px;border:1px solid #e3ecf5;color:#5b7086;font-size:10.5px;">AVG GOAL PROGRESS</th>
      </tr>
    </thead>
    <tbody>
      ${deptRows
        .map(
          (r) =>
            `<tr><td style="padding:8px 10px;border:1px solid #e3ecf5;font-weight:600;">${r.d}</td><td style="padding:8px 10px;border:1px solid #e3ecf5;">${r.avg}%</td></tr>`,
        )
        .join("")}
    </tbody>
  </table>

  <div style="font-size:15px;font-weight:800;margin-bottom:10px;">Employee Performance Detail</div>
  <table style="width:100%;border-collapse:collapse;margin-bottom:26px;font-size:12.5px;">
    <thead>
      <tr style="background:#f8fafc;">
        <th style="text-align:left;padding:8px 10px;border:1px solid #e3ecf5;color:#5b7086;font-size:10.5px;">EMPLOYEE</th>
        <th style="text-align:left;padding:8px 10px;border:1px solid #e3ecf5;color:#5b7086;font-size:10.5px;">DEPARTMENT</th>
        <th style="text-align:left;padding:8px 10px;border:1px solid #e3ecf5;color:#5b7086;font-size:10.5px;">GOAL PROGRESS</th>
        <th style="text-align:left;padding:8px 10px;border:1px solid #e3ecf5;color:#5b7086;font-size:10.5px;">LATEST REVIEW</th>
      </tr>
    </thead>
    <tbody>
      ${empRows
        .map(
          (r) =>
            `<tr><td style="padding:8px 10px;border:1px solid #e3ecf5;font-weight:600;">${r.emp.name}</td><td style="padding:8px 10px;border:1px solid #e3ecf5;">${r.emp.dept}</td><td style="padding:8px 10px;border:1px solid #e3ecf5;">${r.avg}%</td><td style="padding:8px 10px;border:1px solid #e3ecf5;">${r.rev && r.rev.overall ? r.rev.overall + "/5.0" : "—"}</td></tr>`,
        )
        .join("")}
    </tbody>
  </table>

  <div style="font-size:10.5px;color:#94a3b8;border-top:1px solid #e3ecf5;padding-top:12px;margin-top:8px;">
    Confidential — Centinel HR internal document. This report reflects data captured as of ${generatedStr} and is intended for internal performance management use only.
  </div>
</div>`;
      }
      function exportReport() {
        const area = document.getElementById("printReportArea");
        area.innerHTML = generateReportHTML(reportPeriod);
        area.style.display = "block";
        setTimeout(() => window.print(), 50);
        toast("Report ready — use the print dialog to save as PDF");
      }
      window.addEventListener("afterprint", () => {
        const area = document.getElementById("printReportArea");
        if (area) area.style.display = "none";
      });

      function renderPeople() {
        const scope =
          currentRole === "hradmin"
            ? team
            : team.filter((t) => t.id !== "EMP-1005");
        return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div style="color:var(--muted);font-size:13px;">${scope.length} people</div>${currentRole === "hradmin" ? `<button class="btn btn-primary" onclick="openModal(addEmployeeModal())">${iconSvg("people")} Add Employee</button>` : ""}</div><div class="grid-cols-auto">${scope
          .map((emp) => {
            const eg = goals.filter((g) => g.employeeId === emp.id);
            const avg = eg.length
              ? Math.round(eg.reduce((a, g) => a + g.progress, 0) / eg.length)
              : 0;
            const rev = reviews.find((r) => r.employeeId === emp.id);
            return `<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><div class="avatar-ring" style="width:44px;height:44px;font-size:15px;">${emp.initials}</div><div><div style="font-weight:700;font-size:14px;">${emp.name}</div><div style="font-size:11.5px;color:var(--muted);">${emp.position}</div></div></div><div style="font-size:11.5px;color:var(--muted);margin-bottom:4px;">Goal Progress</div><div class="progress-track" style="margin-bottom:10px;"><div class="progress-fill" style="width:${avg}%"></div></div><div style="display:flex;justify-content:space-between;align-items:center;"><span class="badge badge-grey">${emp.dept}</span>${rev ? statusBadge(rev.status) : ""}</div></div>`;
          })
          .join("")}</div>`;
      }
      function addEmployeeModal() {
        return `<div style="font-weight:800;font-size:16px;margin-bottom:18px;">Add Employee</div><form onsubmit="event.preventDefault();closeModal();toast('Employee added');"><div style="display:flex;gap:10px;"><input class="field-input" placeholder="First Name" required><input class="field-input" placeholder="Last Name" required></div><label class="field-label">Position</label><input class="field-input" placeholder="e.g. Tour Coordinator" required><label class="field-label">Department</label><select class="field-select"><option>Sales & Bookings</option><option>Operations</option><option>Support</option><option>Partnerships</option><option>Human Resources</option></select><label class="field-label">Reports To</label><select class="field-select">${team.map((t) => `<option>${t.name}</option>`).join("")}</select><div style="display:flex;gap:10px;margin-top:6px;"><button type="button" class="btn btn-ghost" style="flex:1;justify-content:center;" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;">Add Employee</button></div></form>`;
      }

      function renderSettings() {
        return `<div class="card" style="max-width:640px;"><div style="font-weight:800;font-size:15px;margin-bottom:16px;">Review Cycle Settings</div><label class="field-label">Default Rating Scale</label><select class="field-select"><option>1–5 Scale</option><option>1–10 Scale</option><option>Pass / Needs Improvement</option></select><label class="field-label">Review Frequency</label><select class="field-select"><option>Semi-Annual</option><option>Annual</option><option>Quarterly</option></select><label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:14px;"><input type="checkbox" checked> Automatically remind managers of overdue reviews</label><label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:14px;"><input type="checkbox" checked> Managers set skill ratings for their team</label><label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:20px;"><input type="checkbox"> Make peer feedback anonymous by default</label><button class="btn btn-primary" onclick="toast('Settings saved')">Save Settings</button></div>`;
      }

      let profileEditMode = false;
      function renderProfile() {
        const u = currentUsers[currentRole];
        const lockIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>`;
        const editing = profileEditMode;
        return `<div style="display:grid;grid-template-columns:1.05fr 1fr;gap:20px;align-items:start;max-width:1180px;">

  <!-- LEFT CARD: Photo + system-locked fields -->
  <div class="card">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:22px;">
      <div class="profile-photo-wrap">
        <div class="profile-photo" id="profilePhotoEl" style="${avatarStyle(u.photo)}">${u.photo ? "" : u.initials}</div>
        <div class="profile-photo-edit" onclick="document.getElementById('photoFileInput').click()" title="Change photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </div>
      </div>
      <div>
        <div style="font-weight:800;font-size:18px;line-height:1.2;">${u.name}</div>
        <div style="color:var(--muted);font-size:13px;margin-top:2px;">${u.position}</div>
        <div style="color:var(--muted);font-size:11.5px;margin-top:1px;">${u.dept} · ${u.roleLabel}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px;">
      <div class="locked-field"><label class="field-label">First Name</label><div class="locked-input-wrap"><input class="field-input" value="${u.firstName}" disabled>${lockIcon}</div></div>
      <div class="locked-field"><label class="field-label">Middle Name</label><div class="locked-input-wrap"><input class="field-input" value="${u.middleName}" disabled>${lockIcon}</div></div>
    </div>
    <div class="locked-field" style="margin-top:10px;"><label class="field-label">Last Name</label><div class="locked-input-wrap"><input class="field-input" value="${u.lastName}" disabled>${lockIcon}</div></div>
    <div class="locked-field" style="margin-top:10px;"><label class="field-label">Employee ID</label><div class="locked-input-wrap"><input class="field-input" value="${u.id}" disabled>${lockIcon}</div></div>
    <div class="locked-field" style="margin-top:10px;"><label class="field-label">Department</label><div class="locked-input-wrap"><input class="field-input" value="${u.dept}" disabled>${lockIcon}</div></div>
    <div class="locked-field" style="margin-top:10px;"><label class="field-label">Position</label><div class="locked-input-wrap"><input class="field-input" value="${u.position}" disabled>${lockIcon}</div></div>
  </div>

  <!-- RIGHT CARD: Editable fields -->
  <div class="card">
    <div class="profile-section-label" style="margin-top:0;margin-bottom:16px;">Your Details</div>
    <label class="field-label">Email</label>
    <input class="field-input" id="profEmail" value="${u.email}" ${editing ? "" : "disabled"}>
    <label class="field-label">Phone Number</label>
    <input class="field-input" id="profPhone" value="${u.phone}" ${editing ? "" : "disabled"}>
    <label class="field-label">About / Bio</label>
    <textarea class="field-textarea" id="profBio" style="min-height:100px;" ${editing ? "" : "disabled"}>${u.bio}</textarea>
    ${editing ? `<div style="display:flex;gap:10px;margin-top:6px;"><button class="btn btn-ghost" style="flex:1;justify-content:center;" onclick="cancelEditProfile()">Cancel</button><button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="saveProfile()">Save Changes</button></div>` : `<button class="btn btn-outline" onclick="startEditProfile()">Edit Profile</button>`}
  </div>

</div>`;
      }
      function startEditProfile() {
        profileEditMode = true;
        navigate("profile");
      }
      function cancelEditProfile() {
        profileEditMode = false;
        navigate("profile");
      }
      function saveProfile() {
        const u = currentUsers[currentRole];
        u.email = document.getElementById("profEmail").value;
        u.phone = document.getElementById("profPhone").value;
        u.bio = document.getElementById("profBio").value;
        profileEditMode = false;
        navigate("profile");
        toast("Profile updated");
      }
      function handlePhotoFile(evt) {
        const file = evt.target.files && evt.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          currentUsers[currentRole].photo = e.target.result;
          renderShell();
          navigate("profile");
          toast("Profile photo updated");
        };
        reader.readAsDataURL(file);
        evt.target.value = "";
      }

      navigate("dashboard");
    </script>
  </body>
</html>
